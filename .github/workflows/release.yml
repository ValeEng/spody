# Build + draft-release pipeline for SpOdy.
#
# Triggered automatically by a tag push matching v*.*.*[-*]
# (e.g. v0.1.0-alpha, v1.2.3, v2.0.0-rc1). Can also be run manually
# from the Actions tab via workflow_dispatch -- in that case nothing
# is published, only the build artifacts are produced for inspection.
#
# On a tag push the flow is:
#
#   1.  build job (matrix Win / Linux / macOS arm64)
#         - check out repo + spody-core submodule
#         - install gcc / clang + cmake + python + chromium
#         - configure & build spody (the C engine) with -O3 + LTO
#           and the OMP-SIMD pragmas enabled
#         - set up the Python venv and install GUI + docs deps
#         - rebuild the user-manual PDF (via the just-installed
#           chromium / Edge)
#         - run build_bundle.py to produce dist/spody-gui/
#         - archive the bundle (zip on Win/macOS, tar.gz on Linux)
#         - compute SHA256 of the archive
#         - upload archive + SHA256 as workflow artifacts
#
#   2.  release job (needs: build, runs once on ubuntu)
#         - download every build artifact
#         - create a DRAFT GitHub Release at the pushed tag, with
#           every artifact attached and a pre-release flag set when
#           the tag has an -alpha / -beta / -rc suffix
#         - the human goes to github.com, reviews the assets, edits
#           the changelog, and clicks "Publish release"

name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Cancel an in-flight run if a newer commit pushes the same tag (rare
# but possible during a rebuild).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write     # needed by softprops/action-gh-release to draft

jobs:

  build:
    name: build (${{ matrix.os-label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            os-label: win64
            archive-ext: zip
            shell: pwsh
          - os: ubuntu-latest
            os-label: linux-x86_64
            archive-ext: tar.gz
            shell: bash
          - os: macos-latest        # arm64 (M1+)
            os-label: macos-arm64
            archive-ext: zip
            shell: bash

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: ${{ matrix.shell }}

    steps:
      # -- repo --------------------------------------------------------
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # -- toolchain ---------------------------------------------------
      # Windows: MinGW 12+ and CMake are preinstalled on
      # windows-latest at well-known paths -- prepending the MinGW
      # bin dir to PATH is enough and dodges the broken cleanup
      # script in egor-tensin/setup-mingw on current images.
      # Linux: gcc + cmake preinstalled on ubuntu-latest.
      # macOS:  clang preinstalled (system default); cmake from the
      #          stock Homebrew install on macos-latest.
      - name: expose preinstalled MinGW (windows)
        if: runner.os == 'Windows'
        run: |
          # Path is documented in the windows-latest runner-image
          # readme; gcc here is MinGW 12+. PREPEND to GITHUB_PATH so
          # cmake's compiler probe in the next step picks this gcc
          # over the older Strawberry Perl one already on PATH.
          Add-Content $env:GITHUB_PATH 'C:\ProgramData\mingw64\mingw64\bin'
          gcc --version
          cmake --version

      - name: install chromium (linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y chromium-browser

      - name: install chrome + libomp (macos)
        if: runner.os == 'macOS'
        run: |
          # Apple Clang ships without OpenMP; libomp is needed for
          # CMake's find_package(OpenMP) to succeed and link the
          # parallel-batch loop in spody. Brew puts it under
          # /opt/homebrew/opt/libomp on arm64 and marks it keg-only,
          # so CMake needs the OpenMP_C_* hints set on the cmake
          # configure step below.
          brew install libomp
          # Google Chrome (not the chromium cask) because Homebrew
          # deprecated chromium on 2026-09-01: it doesn't pass macOS
          # Gatekeeper and will stop installing after that date.
          # Chrome and Chromium share the same engine for headless
          # PDF; build_pdf.py finds Chrome at the standard install
          # path /Applications/Google Chrome.app/... .
          brew install --cask google-chrome

      - name: set up python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # -- C build -----------------------------------------------------
      # GCC on Win/Linux (the user explicitly wants gcc/clang over
      # MSVC for the optimiser); clang is the system default on
      # macOS. INTERPROCEDURAL_OPTIMIZATION = LTO; the OMP-SIMD
      # option turns on -fopenmp-simd in spody-core's inner loops.
      - name: configure cmake (windows)
        if: runner.os == 'Windows'
        run: >
          cmake -B build -G "MinGW Makefiles"
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON
          -DSPODY_ENABLE_OMP_SIMD=ON

      - name: configure cmake (linux)
        if: runner.os == 'Linux'
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON
          -DSPODY_ENABLE_OMP_SIMD=ON

      - name: configure cmake (macos)
        if: runner.os == 'macOS'
        run: |
          # Apple Clang doesn't accept plain -fopenmp; its driver
          # has no built-in OpenMP runtime, so CMake's standard
          # FindOpenMP probe fails even when libomp is on disk. The
          # well-known workaround is to pre-seed the OpenMP_C_*
          # variables that FindOpenMP would otherwise populate from
          # the probe -- once these are set, FindOpenMP trusts them
          # and stops probing.
          #
          # Layout it expects:
          #   -Xpreprocessor -fopenmp   tell the preprocessor to
          #                              recognise #pragma omp
          #                              (without trying to wire in
          #                              a non-existent runtime via
          #                              the driver)
          #   -I<libomp>/include        omp.h
          #   -lomp -L<libomp>/lib      libomp.dylib (link time)
          LIBOMP_PREFIX="$(brew --prefix libomp)"
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON \
            -DSPODY_ENABLE_OMP_SIMD=ON \
            -DOpenMP_C_FLAGS="-Xpreprocessor -fopenmp -I${LIBOMP_PREFIX}/include" \
            -DOpenMP_C_LIB_NAMES="omp" \
            -DOpenMP_omp_LIBRARY="${LIBOMP_PREFIX}/lib/libomp.dylib"

      - name: build spody
        run: cmake --build build --config Release --target spody --parallel

      # -- python deps -------------------------------------------------
      - name: install gui + docs deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ./python[dev]

      # -- bundle ------------------------------------------------------
      # build_bundle.py auto-rebuilds the manual PDF and runs
      # PyInstaller; the manual builder picks up the chromium /
      # Edge installed above.
      - name: build bundle
        run: python python/build_bundle.py

      # -- archive -----------------------------------------------------
      # Filename pattern: spody-gui-<tag>-<os-label>.<ext> (e.g.
      # spody-gui-v0.1.0-alpha-win64.zip). Computed once and
      # reused across the upload step.
      - name: compute archive name (windows)
        if: runner.os == 'Windows'
        run: |
          $tag = "${{ github.ref_name }}"
          if (-not $tag) { $tag = "dev" }
          $name = "spody-gui-$tag-${{ matrix.os-label }}.${{ matrix.archive-ext }}"
          echo "ARCHIVE_NAME=$name" >> $env:GITHUB_ENV
          echo "Archive will be: $name"

      - name: compute archive name (unix)
        if: runner.os != 'Windows'
        run: |
          tag="${GITHUB_REF_NAME:-dev}"
          name="spody-gui-${tag}-${{ matrix.os-label }}.${{ matrix.archive-ext }}"
          echo "ARCHIVE_NAME=${name}" >> "$GITHUB_ENV"
          echo "Archive will be: ${name}"

      - name: pack (windows)
        if: runner.os == 'Windows'
        run: |
          Compress-Archive -Path python/dist/spody-gui `
                           -DestinationPath "$env:ARCHIVE_NAME"

      - name: pack (macos)
        if: runner.os == 'macOS'
        run: |
          # Use ditto so resource forks and HFS metadata are preserved
          # (important for any future code-signed binaries).
          ditto -c -k --sequesterRsrc python/dist/spody-gui "$ARCHIVE_NAME"

      - name: pack (linux)
        if: runner.os == 'Linux'
        run: |
          tar -C python/dist -czf "$ARCHIVE_NAME" spody-gui

      - name: compute sha256 (windows)
        if: runner.os == 'Windows'
        run: |
          $hash = (Get-FileHash "$env:ARCHIVE_NAME" -Algorithm SHA256).Hash.ToLower()
          "$hash  $env:ARCHIVE_NAME" | Out-File -Encoding ascii "${env:ARCHIVE_NAME}.sha256"
          Get-Content "${env:ARCHIVE_NAME}.sha256"

      - name: compute sha256 (unix)
        if: runner.os != 'Windows'
        run: |
          shasum -a 256 "$ARCHIVE_NAME" > "${ARCHIVE_NAME}.sha256"
          cat "${ARCHIVE_NAME}.sha256"

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: spody-gui-${{ matrix.os-label }}
          path: |
            ${{ env.ARCHIVE_NAME }}
            ${{ env.ARCHIVE_NAME }}.sha256
          if-no-files-found: error
          retention-days: 14

  # -- aggregate + publish ------------------------------------------
  release:
    name: draft release
    needs: build
    # Only push tags trigger the release. workflow_dispatch builds
    # the artifacts (useful for testing the workflow without tagging)
    # but doesn't publish.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: list assets
        run: |
          echo "Tag: ${GITHUB_REF_NAME}"
          find artifacts -type f -print

      - name: draft github release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: true
          # Mark as pre-release for -alpha/-beta/-rc tags so GitHub's
          # "Latest" badge skips them. The contains() check is loose
          # on purpose -- any of these suffixes flips the flag.
          prerelease: >-
            ${{
              contains(github.ref_name, '-alpha') ||
              contains(github.ref_name, '-beta')  ||
              contains(github.ref_name, '-rc')
            }}
          generate_release_notes: true
          files: |
            artifacts/**/*.zip
            artifacts/**/*.tar.gz
            artifacts/**/*.sha256
