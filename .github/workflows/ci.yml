name: CI

# Build spody (the application) on the three major desktop platforms with
# both common free compilers per platform. Runs on every push to main and
# every pull request.
#
# Unlike spody-core, the checkout step here MUST recursively fetch the
# spody-core submodule, otherwise external/spody-core is empty and the
# add_subdirectory() in CMakeLists.txt fails.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.os }} / ${{ matrix.compiler }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: gcc
            cc: gcc
          - os: ubuntu-latest
            compiler: clang
            cc: clang
          - os: macos-latest
            compiler: clang
            cc: clang
          - os: windows-latest
            compiler: msvc

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Configure
        env:
          CC: ${{ matrix.cc }}
        # SPODY_WHOLE_PROGRAM_OPT=OFF disables -flto / /GL+/LTCG. The Ubuntu
        # runners ship a clang whose bitcode (LLVM 18) is newer than the gold
        # plugin shipped with binutils (LLVM 16), so an LTO link fails with
        # "file format not recognized". CI is a build + smoke test, not a
        # performance benchmark, so we just turn LTO off here. Local Release
        # builds keep it on by default.
        #
        # SPODY_WITH_OPENMP=OFF for the same reason: the application's
        # parallel-batch loop links OpenMP, and clang on the CI runners
        # (Linux + macOS) does not auto-resolve libomp the way gcc finds
        # libgomp or MSVC finds vcomp. Installing libomp on every clang
        # job would let CI verify the OpenMP wiring too, but a smoke test
        # 'does it build, does spody info run' doesn't need that. The
        # release.yml workflow keeps OpenMP ON and installs libomp on
        # macOS, so the shipped bundle is always built with the parallel
        # loop linked in.
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Release
          -DSPODY_WHOLE_PROGRAM_OPT=OFF
          -DSPODY_WITH_OPENMP=OFF

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Smoke test (spody info)
        shell: bash
        run: |
          # Locate the spody binary in either single-config (build/) or
          # multi-config (build/Release/) layout.
          if [ -x build/spody ]; then
              build/spody info
          elif [ -x build/Release/spody.exe ]; then
              build/Release/spody.exe info
          elif [ -x build/spody.exe ]; then
              build/spody.exe info
          else
              echo "could not locate spody binary"
              find build -maxdepth 3 -name "spody*"
              exit 1
          fi
