[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "spody_gui"
version = "0.1.0"
description = "Desktop GUI for the spody propagator (TOML editor + runner + result viewer)"
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
authors = [{ name = "Valerio (@ValeEng)" }]

# PySide6 is the only runtime dep. We pin a range that works on Python 3.9
# (the latest interpreter available on the project dev machine).
dependencies = [
    "PySide6 >= 6.5, < 7",
]

[project.optional-dependencies]
dev = [
    "pyinstaller >= 6.0",
]

[project.scripts]
spody-gui = "spody_gui.main:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["spody_gui*"]
